<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>원소 기호 짝맞추기 (하)</title>
<style>
    body {
        font-family: Arial;
        text-align: center;
        background: #f4f6f8;
    }
    h1 {
        margin-top: 20px;
    }
    .info {
        margin-top: 10px;
        font-size: 18px;
    }
    .game-board {
        display: grid;
        grid-template-columns: repeat(4, 100px);
        gap: 10px;
        justify-content: center;
        margin-top: 20px;
    }
    .card {
        width: 100px;
        height: 100px;
        background: #3498db;
        color: white;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 20px;
        cursor: pointer;
        border-radius: 10px;
    }
    .flipped {
        background: white;
        color: black;
        border: 2px solid #3498db;
    }
    .matched {
        background: #2ecc71;
        color: white;
        cursor: default;
    }
    button {
        margin-top: 15px;
        padding: 10px 20px;
        font-size: 16px;
    }
</style>
</head>
<body>

<h1>🧪 원소 기호 짝맞추기</h1>

<div class="info">
    ⏱ 시간: <span id="time">120</span>초 |
    🏆 점수: <span id="score">0</span>
</div>

<button onclick="startGame()">게임 시작</button>

<div class="game-board" id="board"></div>

<script>
const elements = [
    ["수소", "H"], ["산소", "O"], ["탄소", "C"], ["질소", "N"],
    ["나트륨", "Na"], ["염소", "Cl"], ["철", "Fe"], ["금", "Au"]
];

let cards = [];
let firstCard = null;
let secondCard = null;
let lock = false;
let score = 0;
let time = 120;
let timer;

const board = document.getElementById("board");

function startGame() {
    board.innerHTML = "";
    score = 0;
    time = 120;
    document.getElementById("score").innerText = score;
    document.getElementById("time").innerText = time;

    cards = [];
    elements.forEach(pair => {
        cards.push({text: pair[0], pair: pair[1]});
        cards.push({text: pair[1], pair: pair[1]});
    });

    cards.sort(() => 0.5 - Math.random());

    cards.forEach(cardData => {
        const card = document.createElement("div");
        card.classList.add("card");
        card.dataset.pair = cardData.pair;
        card.innerText = "";

        card.addEventListener("click", () => handleClick(card, cardData));
        board.appendChild(card);
    });

    clearInterval(timer);
    timer = setInterval(() => {
        time--;
        document.getElementById("time").innerText = time;

        if (time <= 0) {
            clearInterval(timer);
            alert("⏰ 시간 종료! 점수: " + score);
        }
    }, 1000);
}

function handleClick(card, cardData) {
    if (lock || card.classList.contains("flipped") || card.classList.contains("matched")) return;

    card.innerText = cardData.text;
    card.classList.add("flipped");

    if (!firstCard) {
        firstCard = card;
    } else {
        secondCard = card;
        lock = true;

        if (firstCard.dataset.pair === secondCard.dataset.pair) {
            firstCard.classList.add("matched");
            secondCard.classList.add("matched");
            score += 100;
            updateScore();
            reset();
            checkWin();
        } else {
            score -= 0;
            updateScore();
            setTimeout(() => {
                firstCard.innerText = "";
                secondCard.innerText = "";
                firstCard.classList.remove("flipped");
                secondCard.classList.remove("flipped");
                reset();
            }, 800);
        }
    }
}

function updateScore() {
    document.getElementById("score").innerText = score;
}

function reset() {
    firstCard = null;
    secondCard = null;
    lock = false;
}

function checkWin() {
    const matched = document.querySelectorAll(".matched").length;
    if (matched === cards.length) {
        clearInterval(timer);
        alert("🎉 성공! 최종 점수: " + score);
    }
}
</script>

</body>
</html>
